backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: en

collections:
  - name: profile
    label: Profile
    files:
      - name: profile
        label: Profile Settings
        file: src/data/profile.json
        format: json
        fields:
          - label: Name
            name: name
            widget: string
          - label: Tagline
            name: tagline
            widget: string
            hint: Short descriptor shown below your name
          - label: Bio
            name: bio
            widget: text
            hint: Full bio paragraph shown in the About section
          - label: Research Statement
            name: researchStatement
            widget: text
            hint: No longer displayed but kept for reference
          - label: Email
            name: email
            widget: string
          - label: LinkedIn URL
            name: linkedin
            widget: string
          - label: Google Scholar URL
            name: googleScholar
            widget: string
          - label: Positions
            name: positions
            widget: list
            summary: "{{fields.role}} · {{fields.organization}}"
            fields:
              - label: Role
                name: role
                widget: string
              - label: Organization
                name: organization
                widget: string
              - label: Department
                name: department
                widget: string
                required: false
          - label: Teaching
            name: teaching
            widget: list
            summary: "{{fields.course}} · {{fields.term}}"
            fields:
              - label: Course
                name: course
                widget: string
              - label: Institution
                name: institution
                widget: string
              - label: Program
                name: program
                widget: string
              - label: Role
                name: role
                widget: string
                hint: e.g. "Co-instructor", "Guest lecturer"
              - label: Term
                name: term
                widget: string
                hint: e.g. "Fall 2024", "Winter 2025"

  - name: content
    label: Content
    files:
      - name: publications
        label: Selected Papers
        file: src/data/publications.json
        format: json
        fields:
          - label: Papers
            name: papers
            widget: list
            summary: "{{fields.title}} ({{fields.year}})"
            hint: Drag and drop to reorder
            fields:
              - label: Title
                name: title
                widget: string
              - label: Authors
                name: authors
                widget: string
                hint: Full author list, comma-separated
              - label: Venue
                name: venue
                widget: string
                hint: e.g. "PLoS ONE", "NeurIPS", "arXiv"
              - label: Year
                name: year
                widget: number
                value_type: int
              - label: Link
                name: link
                widget: string
                hint: URL to the paper
              - label: BibTeX
                name: bibtex
                widget: text
                hint: Paste the full BibTeX entry here
              - label: Abstract
                name: abstract
                widget: text

      - name: patents
        label: Patents
        file: src/data/patents.json
        format: json
        fields:
          - label: Patents
            name: patents
            widget: list
            summary: "{{fields.number}} — {{fields.title}}"
            hint: Drag and drop to reorder
            fields:
              - label: Patent Number
                name: number
                widget: string
                hint: e.g. "US12456047B2"
              - label: Title
                name: title
                widget: string
              - label: Inventors
                name: inventors
                widget: string
                hint: Comma-separated
              - label: Assignee
                name: assignee
                widget: string
                hint: e.g. "Google LLC"
              - label: Year
                name: year
                widget: number
                value_type: int
                hint: Grant year
              - label: Link
                name: link
                widget: string
                hint: Google Patents URL
              - label: Description
                name: description
                widget: text
                required: false
